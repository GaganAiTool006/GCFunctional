<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — NexaPay</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="dashboard-body">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <a class="brand brand-light sidebar-brand brand-animated" href="#home">
          <img src="assets/images/logo.svg" alt="NexaPay" class="brand-logo sidebar-logo-animated">
          <span>NexaPay</span>
        </a>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">×</button>
      </div>
      <nav class="sidebar-nav" aria-label="Dashboard navigation">
        <a href="#home" data-page="home">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>Home</span>
        </a>
        <a href="#deposit" data-page="deposit">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><path d="M12 8v8m-4-4h8"/><path d="M4 12a8 8 0 0 1 16 0 8 8 0 0 1-16 0"/></svg>
          <span>Deposit</span>
        </a>
        <a href="#withdraw" data-page="withdraw">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/><polyline points="12 5 9 8 15 8"/></svg>
          <span>Withdraw</span>
        </a>
        <a href="#trs" data-page="trs">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          <span>TRS</span>
        </a>
        <a href="#tr" data-page="tr">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          <span>TR</span>
        </a>
        <a href="#profile" data-page="profile">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>Profile</span>
        </a>
      </nav>
      <div class="sidebar-card">
        <span>Available Balance</span>
        <strong id="sidebarBalance">₹0.00</strong>
        <a href="#deposit" data-page="deposit">Add funds →</a>
      </div>
      <button class="logout-button" id="logoutButton"><span>↪</span> Logout</button>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-area">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-button dashboard-menu" id="sidebarOpen" aria-label="Open sidebar">☰</button>
          <div>
            <span class="topbar-kicker" id="pageKicker">Overview</span>
            <h1 id="pageTitle">Home</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="themeToggle" aria-label="Toggle theme">◐</button>
          <button class="notification-button" aria-label="Notifications">♢<span></span></button>
          <button class="user-menu-button" id="profileShortcut">
            <span class="avatar" id="topAvatar">NP</span>
            <span class="user-copy"><strong id="topUserName">User</strong><small id="topUserEmail">user@example.com</small></span>
          </button>
        </div>
      </header>

      <section class="page-container" id="pageContent" aria-live="polite"></section>
    </main>
  </div>

  <div class="modal-backdrop hidden" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Close modal">×</button>
      <div id="modalContent"></div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="assets/js/app.js"></script>
</body>
</html>
